<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cartographie des sols du Québec</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#2c1f0e;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#c8a87a}
#header{padding:10px 16px;background:rgba(250,247,242,0.96);border-bottom:1px solid rgba(80,55,30,0.2);flex-shrink:0}
#header h1{font-size:15px;font-weight:600}
#header p{font-size:12px;color:#7a6248}
#toolbar{padding:8px 12px;background:rgba(250,247,242,0.95);border-bottom:1px solid rgba(80,55,30,0.15);display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
#toolbar input,#toolbar select{font-size:13px;padding:5px 10px;border:1px solid rgba(80,55,30,0.25);border-radius:6px;background:rgba(240,235,227,0.9);color:#2c1f0e;outline:none}
#toolbar input{width:200px}
#count{font-size:12px;color:#7a6248;margin-left:4px}
#zoom-wrap{margin-left:auto;display:flex;gap:4px}
#zoom-wrap button{width:28px;height:28px;border:1px solid rgba(80,55,30,0.25);border-radius:6px;background:rgba(240,235,227,0.9);cursor:pointer;font-size:15px;color:#2c1f0e}
#zoom-wrap button:hover{background:#e0d8cc}
#layout{display:flex;flex:1;overflow:hidden;min-height:0}
#sidebar{width:210px;min-width:210px;background:rgba(250,247,242,0.96);border-right:1px solid rgba(80,55,30,0.15);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#sidebar h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#7a6248;padding:10px 12px 6px;border-bottom:1px solid rgba(80,55,30,0.1)}
#slist{overflow-y:auto;flex:1;padding:4px}
.si{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:12.5px;color:#2c1f0e;user-select:none}
.si:hover{background:rgba(240,235,227,0.8)}
.si.on{background:#f0dfc0;color:#4a2e0c;font-weight:500}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sb{font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px;flex-shrink:0;font-weight:500}
.se{background:#f5e6c0;color:#7a5020;border:1px solid #b5813e}
.sm{background:#ddeaec;color:#1e3f43;border:1px solid #3d6f74}
.ss{background:#d4edda;color:#1a4a1a;border:1px solid #2d6a2d}
.spdf{font-size:11px;margin-left:auto;flex-shrink:0;opacity:0.7}
.sep{height:1px;background:rgba(80,55,30,0.1);margin:6px 4px}
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#a08060;padding:8px 7px 3px}
.si-absent{opacity:0.55;font-style:italic;cursor:default}
.si-absent:hover{background:none}
#carea{flex:1;position:relative;overflow:hidden;cursor:grab;min-width:0}
#carea.grab{cursor:grabbing}
canvas{display:block;position:absolute;top:0;left:0}
#bg-canvas{z-index:0}
#main-canvas{z-index:1}
#hlabel{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(44,31,14,0.82);color:#faf7f2;font-size:12px;padding:3px 12px;border-radius:12px;pointer-events:none;display:none;white-space:nowrap;z-index:10}
#absent-search{display:none;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(250,247,242,0.97);border:1px solid rgba(80,55,30,0.25);border-radius:8px;padding:10px 14px;font-size:12px;z-index:50;min-width:260px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
#absent-search strong{display:block;margin-bottom:5px;font-size:13px}
#absent-search ul{list-style:none}
#absent-search li{padding:3px 0}
#absent-search a{color:#7a5020;cursor:pointer;text-decoration:underline}
#panel{width:260px;min-width:260px;background:rgba(250,247,242,0.97);border-left:1px solid rgba(80,55,30,0.15);display:none;flex-direction:column;flex-shrink:0;overflow-y:auto}
#panel.show{display:flex}
#pclose{text-align:right;padding:8px 10px 0}
#pclose button{background:none;border:none;cursor:pointer;font-size:17px;color:#7a6248;padding:2px 6px;border-radius:4px}
#pclose button:hover{background:rgba(240,235,227,0.8)}
#pbody{padding:4px 14px 20px}
.pn{font-size:17px;font-weight:600;margin-bottom:5px}
.pb{font-size:11px;padding:2px 9px;border-radius:10px;display:inline-block;margin-bottom:8px;font-weight:500}
.pspec{margin:6px 0 8px;font-size:11.5px;padding:6px 10px;border-radius:6px;line-height:1.5}
.pe{background:#f5e6c0;color:#7a5020;border-left:3px solid #b5813e}
.pm{background:#ddeaec;color:#1e3f43;border-left:3px solid #3d6f74}
.ps{background:#d4edda;color:#1a4a1a;border-left:3px solid #2d6a2d}
.pr{font-size:12px;color:#7a6248;margin-bottom:4px}
.pr strong{color:#2c1f0e}
.psep{height:1px;background:rgba(80,55,30,0.1);margin:10px 0}
.pst{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#7a6248;margin-bottom:5px}
.psl{font-size:12.5px;padding:3px 0;color:#7a5020;cursor:pointer;display:flex;align-items:center;gap:4px}
.psl:hover{text-decoration:underline}
.psa{font-size:11px;color:#7a6248;padding:2px 0;font-style:italic}
.ppdf{display:block;margin-top:14px;text-align:center;font-size:13px;font-weight:500;color:#3d6f74;text-decoration:none;border:1px solid #3d6f74;border-radius:6px;padding:8px 12px}
.ppdf:hover{background:#ddeaec}
.ordre-desc{font-size:12.5px;line-height:1.7;color:#3d3220;margin-top:6px}
.ordre-img{width:100%;border-radius:6px;margin:10px 0 4px;display:block}
.credit{font-size:10px;color:#a08060;text-align:center;margin-bottom:8px}
#legend{padding:6px 12px;background:rgba(250,247,242,0.95);border-top:1px solid rgba(80,55,30,0.15);display:flex;gap:10px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.leg{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#7a6248}
.leg.ordre-leg{cursor:pointer;padding:2px 5px;border-radius:5px;transition:background .12s}
.leg.ordre-leg:hover{background:rgba(240,235,227,0.8)}
.leg.ordre-leg span{text-decoration:underline dotted;color:#4a2e0c}
.ld{width:12px;height:12px;border-radius:50%;flex-shrink:0}
#hint{font-size:11px;color:#7a6248;margin-left:auto}
</style>
</head>
<body>
<div id="header">
  <h1>Cartographie des sols du Québec</h1>
  <p>Séries de sol — Classification canadienne</p>
</div>
<div id="toolbar">
  <input id="search" placeholder="Rechercher une série..." autocomplete="off"/>
  <select id="filter">
    <option value="">Tous les ordres</option>
    <option value="Podzol">Podzols</option>
    <option value="Gleysol">Gleysols</option>
    <option value="Brunisol">Brunisols</option>
    <option value="Organique">Organiques</option>
  </select>
  <span id="count"></span>
  <div id="zoom-wrap">
    <button id="zin">+</button>
    <button id="zout">−</button>
    <button id="zreset" style="width:auto;padding:0 8px;font-size:12px">Reset</button>
  </div>
</div>
<div id="layout">
  <div id="sidebar">
    <h2>Séries de sol</h2>
    <div id="slist"></div>
  </div>
  <div id="carea">
    <canvas id="bg-canvas"></canvas>
    <canvas id="main-canvas"></canvas>
    <div id="hlabel"></div>
    <div id="absent-search">
      <strong id="atitle"></strong>
      <p style="color:#7a6248;margin-bottom:5px">Sol non répertorié. Séries similaires :</p>
      <ul id="alist"></ul>
    </div>
  </div>
  <div id="panel">
    <div id="pclose"><button id="px">✕</button></div>
    <div id="pbody"></div>
  </div>
</div>
<div id="legend">
  <span style="font-size:11px;font-weight:600;color:#7a6248;margin-right:2px">Ordres :</span>
  <div class="leg ordre-leg" data-ordre="Podzol"><div class="ld" style="background:#c8bfa8;border:2px solid #6b5c42"></div><span>Podzols</span></div>
  <div class="leg ordre-leg" data-ordre="Gleysol"><div class="ld" style="background:#8aacb0;border:2px solid #3d6f74"></div><span>Gleysols</span></div>
  <div class="leg ordre-leg" data-ordre="Brunisol"><div class="ld" style="background:#b5813e;border:2px solid #7a5020"></div><span>Brunisols</span></div>
  <div class="leg ordre-leg" data-ordre="Organique"><div class="ld" style="background:#6b5c4a;border:2px solid #3d3228"></div><span>Organiques</span></div>
  <div class="leg" style="margin-left:4px;cursor:default"><svg width="22" height="8"><line x1="0" y1="4" x2="22" y2="4" stroke="rgba(107,92,74,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/></svg><span>Similaires</span></div>
  <div class="leg" style="cursor:default"><span style="font-size:13px">⛏</span><span>Fiche disponible</span></div>
  <span id="hint">Clic sur bulle : détails &nbsp;|&nbsp; Clic sur ordre : description</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const PAL={
  Podzol:   {fill:'#c8bfa8',stroke:'#6b5c42',text:'#3d3220',light:'#ede8df'},
  Gleysol:  {fill:'#8aacb0',stroke:'#3d6f74',text:'#1e3f43',light:'#ddeaec'},
  Brunisol: {fill:'#b5813e',stroke:'#7a5020',text:'#4a2e0c',light:'#f0dfc0'},
  Organique:{fill:'#6b5c4a',stroke:'#3d3228',text:'#faf7f2',light:'#d4cdc4'},
};

const SPECIAL_DESC={
  emblématique:`★ Sol emblématique du Québec\nLa série Sainte-Rosalie a été reconnue comme sol emblématique du Québec par l'Association québécoise de spécialistes en science du sol (AQSSS).`,
  magique:`✦ Sol magique\nLa série De L'Anse est appelée « sol magique » par les pédologues car c'est une argile qui draine comme un sable, due à sa structure particulaire unique. Ce statut a été reconnu par l'AQSSS.`,
  sapin:`🎄 Sol sapin de Noël\nLe Mawcook est surnommé « sol sapin de Noël » car les fragments qui le composent sont d'une grande variété de couleurs (rouge, jaune, vert...). Ce statut a été reconnu par l'AQSSS.`,
};

const ORDRE_IMG={
  Podzol:'Images/Podzol.png',
  Gleysol:'Images/Gleysol.png',
  Brunisol:'Images/Brunisol.png',
  Organique:'Images/Organique.png',
};

const ORDRE_DESC={
  Organique:`Les sols de l'ordre organique doivent contenir une couche de matière organique en surface de plus de 30% de matière organique et présenter une épaisseur supérieure à 40 cm. Ce type de sol se forme souvent dans des zones humides et saturées en eau (tourbières, marécages). L'eau bloque l'oxygène, ce qui ralentit la décomposition et favorise l'accumulation de matière. Lorsqu'ils sont cultivés, ils sont souvent appelés terre noire et subissent une dégradation de leur propriété et une perte de matériel importante.`,
  Podzol:`Les sols podzoliques se retrouvent dans les forêts boréales et les régions tempérées froides. Ils ont généralement un horizon de surface riche en matière organique suivi d'un horizon A éluvial (Ae). L'horizon B caractéristique montre une accumulation de fer (Fe) et d'aluminium (Al). Cette couche est souvent rougeâtre, brun-orangé ou même noire selon la dominance du fer ou de l'humus. Le processus de podzolisation débute par la décomposition des aiguilles de conifères, ce qui produit des acides organiques et agit sur les minéraux du sol en solubilisant le fer et l'aluminium qui sont entraînés. Le nom vient de l'horizon Ae qui ressemble à de la cendre grise, d'où le mot podzol (du russe : pod = sous, zola = cendre).`,
  Gleysol:`Les sols gleyifiés sont présents dans tous les types de climat. Ils sont caractérisés par une couche où le sol a été saturé d'eau suffisamment longtemps pour que l'oxygène disparaisse complètement, déclenchant des réactions chimiques de réduction. Le fer ferrique (Fe³⁺), qui est rouille, brun, orangé est réduit en fer ferreux (Fe²⁺) qui est gris-bleu-verdâtre. La saturation en eau peut être prolongée ou intermittente. Des marbrures de rouille sont généralement présentes et causées par les formes oxydées du fer dû à l'aération par les racines.`,
  Brunisol:`Les brunisols se retrouvent dans une grande variété de climats. Ils sont caractérisés par une couche brune qui montre une altération des minéraux et un début d'accumulation de matière organique et d'oxydes de fer et peuvent présenter une faible podzolisation. L'hydrolyse partielle de minéraux de fer altérables extrait le fer du minéral et le dépose à la surface de l'argile. Le fer va favoriser la stabilité des complexes argilo-humiques en établissant des liaisons cationiques. Ce sont des sols peu développés sans horizon spécifique avec un degré de développement avancé comme les sols des autres ordres.`,
};

let DATA=[],nodes=[],edges=[],selected=null,filterOrdre='',searchStr='';
let T={x:0,y:0,k:1},drag=false,ds=null,ts=null;
const bgCv=document.getElementById('bg-canvas');
const bgCtx=bgCv.getContext('2d');
const cv=document.getElementById('main-canvas');
const ctx=cv.getContext('2d');
const ca=document.getElementById('carea');
const panel=document.getElementById('panel');
const pbody=document.getElementById('pbody');
const hl=document.getElementById('hlabel');
const ab=document.getElementById('absent-search');

function drawBg(){
  const W=bgCv.width,H=bgCv.height;
  bgCtx.clearRect(0,0,W,H);
  const layers=[
    {y:0,   h:0.10,color:'#e8ddd0'},
    {y:0.10,h:0.20,color:'#c8b898'},
    {y:0.30,h:0.22,color:'#b89870'},
    {y:0.52,h:0.24,color:'#a07850'},
    {y:0.76,h:0.24,color:'#886040'},
  ];
  layers.forEach((l,i)=>{
    const y0=l.y*H,y1=(l.y+l.h)*H;
    bgCtx.beginPath();
    if(i>0){
      const segs=10;
      for(let s=0;s<=segs;s++){
        const x=W*s/segs;
        const wave=Math.sin(s*1.2+i*2.0)*16+Math.sin(s*0.6+i*1.1)*9;
        s===0?bgCtx.moveTo(x,y0+wave):bgCtx.lineTo(x,y0+wave);
      }
    } else {
      bgCtx.moveTo(0,y0);
    }
    bgCtx.lineTo(W,y1);bgCtx.lineTo(0,y1);bgCtx.closePath();
    bgCtx.fillStyle=l.color;bgCtx.fill();
  });
  for(let i=0;i<300;i++){
    const x=Math.random()*W,y=Math.random()*H;
    bgCtx.fillStyle=`rgba(0,0,0,${Math.random()*0.02})`;
    bgCtx.fillRect(x,y,Math.random()*3+1,Math.random()*2+1);
  }
}

function resize(){
  bgCv.width=ca.clientWidth;bgCv.height=ca.clientHeight;
  cv.width=ca.clientWidth;cv.height=ca.clientHeight;
  drawBg();draw();
}

function initData(series){
  DATA=series;
  const maxS=d3.max(series,d=>d.superficie);
  nodes=series.map(d=>({...d,r:9+32*Math.sqrt(d.superficie/maxS),x:cv.width/2+(Math.random()-.5)*200,y:cv.height/2+(Math.random()-.5)*200}));
  const ords=[...new Set(series.map(d=>d.ordre))];
  const cx=cv.width/2,cy=cv.height/2,oc={};
  ords.forEach((o,i)=>{const a=(2*Math.PI/ords.length)*i-Math.PI/2;oc[o]={x:cx+190*Math.cos(a),y:cy+170*Math.sin(a)};});
  const seen=new Set();edges=[];
  const ids=new Set(series.map(d=>d.id.trim()));
  series.forEach(d=>{(d.sim||[]).forEach(s=>{const st=s.trim();if(ids.has(st)){const k=[d.id,st].sort().join('|');if(!seen.has(k)){edges.push({src:d.id,tgt:st});seen.add(k);}}});});
  d3.forceSimulation(nodes)
    .force('x',d3.forceX(d=>oc[d.ordre]?.x||cx).strength(.4))
    .force('y',d3.forceY(d=>oc[d.ordre]?.y||cy).strength(.4))
    .force('collide',d3.forceCollide(d=>d.r+3).strength(.9))
    .force('center',d3.forceCenter(cx,cy).strength(.02))
    .alphaDecay(.018).on('tick',draw);
  buildSidebar();
}

const nb=id=>nodes.find(n=>n.id===id)||nodes.find(n=>n.id.trim()===id.trim());
const toWorld=(sx,sy)=>({x:(sx-T.x)/T.k,y:(sy-T.y)/T.k});

function specClass(sp){
  if(sp==='emblématique') return 'pe';
  if(sp==='magique') return 'pm';
  if(sp==='sapin') return 'ps';
  return 'pe';
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.save();ctx.translate(T.x,T.y);ctx.scale(T.k,T.k);
  const AS=new Set(nodes.filter(n=>{
    if(filterOrdre&&n.ordre!==filterOrdre)return false;
    if(searchStr&&!n.id.toLowerCase().includes(searchStr))return false;
    return true;
  }).map(n=>n.id));
  const sn=selected?nb(selected):null;
  const lk=new Set();
  if(sn)edges.forEach(e=>{if(e.src===sn.id)lk.add(e.tgt);if(e.tgt===sn.id)lk.add(e.src);});

  edges.forEach(e=>{
    const a=nb(e.src),b=nb(e.tgt);
    if(!a||!b||!AS.has(a.id)||!AS.has(b.id))return;
    const h=sn&&(lk.has(a.id)||lk.has(b.id));
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=h?'rgba(107,80,32,0.7)':'rgba(120,100,75,0.18)';
    ctx.lineWidth=(h?1.8:.8)/T.k;
    ctx.setLineDash(h?[]:[4/T.k,3/T.k]);ctx.stroke();ctx.setLineDash([]);
  });

  nodes.forEach(n=>{
    if(!AS.has(n.id))return;
    const p=PAL[n.ordre]||PAL.Podzol;
    const iS=sn&&sn.id===n.id,iL=lk.has(n.id),dm=sn&&!iS&&!iL;
    ctx.globalAlpha=dm?.25:1;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,2*Math.PI);
    ctx.fillStyle=iS?p.stroke:p.fill;ctx.fill();
    ctx.strokeStyle=iS?p.text:p.stroke;ctx.lineWidth=(iS?2.5:1.2)/T.k;ctx.stroke();
    const fs=Math.max(7,Math.min(12,n.r*.52))/T.k;
    ctx.fillStyle=iS?'#faf7f2':p.text;
    ctx.font=`${fs}px 'Segoe UI',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(n.id.length>10?n.id.slice(0,9)+'…':n.id,n.x,n.y);
    if(n.special==='emblématique') drawStar(n.x,n.y-n.r-7/T.k,5/T.k,'#b5813e','#7a5020');
    else if(n.special==='magique') drawStar(n.x,n.y-n.r-7/T.k,5/T.k,'#8aacb0','#3d6f74');
    else if(n.special==='sapin') drawStar(n.x,n.y-n.r-7/T.k,5/T.k,'#2d6a2d','#1a4a1a');
    ctx.globalAlpha=1;
  });

  const ordreList=[...new Set(DATA.map(d=>d.ordre))];
  ordreList.forEach(o=>{
    if(filterOrdre&&o!==filterOrdre)return;
    const g=nodes.filter(n=>AS.has(n.id)&&n.ordre===o);if(!g.length)return;
    const p=PAL[o]||PAL.Podzol;
    const gx=d3.mean(g,n=>n.x);
    const gyMin=d3.min(g,n=>n.y-n.r);
    const labelY=gyMin-24/T.k;
    const labelFs=13/T.k;
    ctx.globalAlpha=sn?.35:1;
    ctx.font=`600 ${labelFs}px 'Segoe UI',sans-serif`;
    const tw=ctx.measureText(o+'s').width;
    const pad=8/T.k;
    ctx.fillStyle='rgba(250,247,242,0.88)';
    ctx.beginPath();
    ctx.roundRect(gx-tw/2-pad,labelY-labelFs*.85,tw+pad*2,labelFs*1.6,5/T.k);
    ctx.fill();
    ctx.strokeStyle=p.stroke;ctx.lineWidth=1.2/T.k;ctx.stroke();
    ctx.fillStyle=p.stroke;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(o+'s',gx,labelY+labelFs*.05);
    ctx.globalAlpha=1;
  });

  ctx.restore();
  document.getElementById('count').textContent=`${AS.size} série${AS.size!==1?'s':''}`;
}

function drawStar(cx,cy,r,fill,stroke){
  ctx.beginPath();
  for(let i=0;i<10;i++){const a=(i*Math.PI/5)-Math.PI/2,rd=i%2===0?r:r*.42;i===0?ctx.moveTo(cx+rd*Math.cos(a),cy+rd*Math.sin(a)):ctx.lineTo(cx+rd*Math.cos(a),cy+rd*Math.sin(a));}
  ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=.8/T.k;ctx.stroke();
}

function openPanel(n){
  const p=PAL[n.ordre]||PAL.Podzol;
  const ids=new Set(DATA.map(d=>d.id.trim()));
  const si=(n.sim||[]).filter(s=>ids.has(s.trim()));
  const so=(n.sim||[]).filter(s=>!ids.has(s.trim()));
  let h=`<div class="pn">${n.id}</div>`;
  h+=`<span class="pb" style="background:${p.light};color:${p.text}">${n.ordre}</span>`;
  if(n.special){
    const desc=SPECIAL_DESC[n.special]||'';
    const lines=desc.split('\n');
    h+=`<div class="pspec ${specClass(n.special)}"><strong>${lines[0]}</strong><br>${lines[1]||''}</div>`;
  }
  h+=`<div class="pr">Superficie : <strong>${n.superficie.toLocaleString('fr-CA')} ha</strong></div>`;
  if(si.length||so.length){
    h+=`<div class="psep"></div><div class="pst">Séries similaires</div>`;
    si.forEach(s=>{
      const sn2=DATA.find(d=>d.id.trim()===s.trim());
      const hasPdf=sn2&&sn2.pdf;
      h+=`<div class="psl" data-id="${s.trim()}">→ ${s.trim()}${hasPdf?' <span title="Fiche disponible">⛏</span>':''}</div>`;
    });
    so.forEach(s=>{h+=`<div class="psa">${s.trim()} (non répertorié)</div>`;});
  }
  if(n.pdf)h+=`<a href="${n.pdf}" target="_blank" rel="noopener" class="ppdf">Fiche technique IRDA →</a>`;
  pbody.innerHTML=h;
  panel.classList.add('show');
  pbody.querySelectorAll('.psl').forEach(el=>{
    el.addEventListener('click',()=>{const t=nb(el.dataset.id);if(t){selected=t.id;updateActive();draw();openPanel(t);}});
  });
}

function openOrdrePanel(ordre){
  const p=PAL[ordre]||PAL.Podzol;
  const count=DATA.filter(d=>d.ordre===ordre).length;
  let h=`<div class="pn">${ordre}s</div>`;
  h+=`<span class="pb" style="background:${p.light};color:${p.text}">Ordre pédologique</span>`;
  h+=`<div class="pr" style="margin-bottom:8px">${count} série${count>1?'s':''} répertoriée${count>1?'s':''}</div>`;
  if(ORDRE_IMG[ordre]){
    h+=`<img src="${ORDRE_IMG[ordre]}" alt="Profil de sol — ${ordre}" class="ordre-img"/>`;
    h+=`<div class="credit">© IRDA — Institut de recherche et de développement en agroenvironnement</div>`;
  }
  h+=`<div class="psep"></div><div class="ordre-desc">${ORDRE_DESC[ordre]||''}</div>`;
  pbody.innerHTML=h;
  panel.classList.add('show');
  selected=null;updateActive();draw();
}

function closePanel(){panel.classList.remove('show');selected=null;updateActive();draw();}
document.getElementById('px').addEventListener('click',closePanel);
document.querySelectorAll('.ordre-leg').forEach(el=>{el.addEventListener('click',()=>openOrdrePanel(el.dataset.ordre));});

ca.addEventListener('mousedown',e=>{if(e.target!==cv)return;drag=true;ds={x:e.clientX,y:e.clientY};ts={...T};ca.classList.add('grab');});
window.addEventListener('mousemove',e=>{
  if(drag){T.x=ts.x+(e.clientX-ds.x);T.y=ts.y+(e.clientY-ds.y);draw();return;}
  const r=cv.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;
  if(sx<0||sy<0||sx>r.width||sy>r.height){hl.style.display='none';return;}
  const{x:wx,y:wy}=toWorld(sx,sy);
  const hit=nodes.find(n=>{const dx=n.x-wx,dy=n.y-wy;return Math.sqrt(dx*dx+dy*dy)<n.r;});
  if(hit){
    cv.style.cursor='pointer';
    let lbl=hit.id+' — '+hit.superficie.toLocaleString('fr-CA')+' ha';
    if(hit.special==='emblématique') lbl+=' ★ Sol emblématique';
    else if(hit.special==='magique') lbl+=' ✦ Sol magique';
    else if(hit.special==='sapin') lbl+=' 🎄 Sol sapin de Noël';
    hl.textContent=lbl;hl.style.display='block';
  } else {cv.style.cursor='grab';hl.style.display='none';}
});
window.addEventListener('mouseup',()=>{drag=false;ca.classList.remove('grab');});
ca.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:.89,nk=Math.min(4,Math.max(.3,T.k*f));
  T.x=mx-(mx-T.x)*(nk/T.k);T.y=my-(my-T.y)*(nk/T.k);T.k=nk;draw();
},{passive:false});
document.getElementById('zin').addEventListener('click',()=>zoom(1.25));
document.getElementById('zout').addEventListener('click',()=>zoom(.8));
document.getElementById('zreset').addEventListener('click',()=>{T={x:0,y:0,k:1};draw();});
function zoom(f){const cx=cv.width/2,cy=cv.height/2,nk=Math.min(4,Math.max(.3,T.k*f));T.x=cx-(cx-T.x)*(nk/T.k);T.y=cy-(cy-T.y)*(nk/T.k);T.k=nk;draw();}

let ltd=null;
ca.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;ds={x:e.touches[0].clientX,y:e.touches[0].clientY};ts={...T};}else if(e.touches.length===2){ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
ca.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&drag){T.x=ts.x+(e.touches[0].clientX-ds.x);T.y=ts.y+(e.touches[0].clientY-ds.y);draw();}else if(e.touches.length===2&&ltd){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoom(d/ltd);ltd=d;}},{passive:false});
ca.addEventListener('touchend',()=>{drag=false;ltd=null;});

cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect(),{x:wx,y:wy}=toWorld(e.clientX-r.left,e.clientY-r.top);
  const hit=nodes.find(n=>{const dx=n.x-wx,dy=n.y-wy;return Math.sqrt(dx*dx+dy*dy)<n.r;});
  if(hit){if(selected===hit.id){closePanel();}else{selected=hit.id;openPanel(hit);updateActive();draw();}}
  else{closePanel();}
});

document.getElementById('search').addEventListener('input',e=>{
  searchStr=e.target.value.toLowerCase();
  const val=e.target.value.trim();
  if(val.length>1&&!nodes.some(n=>n.id.toLowerCase().includes(val.toLowerCase()))){
    const matches=[];
    nodes.forEach(n=>{(n.sim||[]).forEach(s=>{if(s.toLowerCase().includes(val.toLowerCase())&&!matches.find(m=>m.ref===n.id))matches.push({absent:s,ref:n.id});});});
    if(matches.length){
      ab.style.display='block';document.getElementById('atitle').textContent=`"${val}" — sol non répertorié`;
      const ul=document.getElementById('alist');ul.innerHTML='';
      matches.forEach(m=>{const li=document.createElement('li');li.innerHTML=`Sol similaire à <a>${m.ref}</a>`;li.querySelector('a').addEventListener('click',()=>{selected=m.ref;searchStr='';document.getElementById('search').value='';ab.style.display='none';const n=nb(m.ref);if(n)openPanel(n);updateActive();draw();});ul.appendChild(li);});
    }else{ab.style.display='none';}
  }else{ab.style.display='none';}
  draw();
});
document.getElementById('filter').addEventListener('change',e=>{filterOrdre=e.target.value;draw();});

function buildSidebar(){
  const list=document.getElementById('slist');list.innerHTML='';
  const ids=new Set(DATA.map(d=>d.id.trim()));
  const sp=DATA.filter(d=>d.special).sort((a,b)=>{
    const order={emblématique:0,magique:1,sapin:2};
    return (order[a.special]??3)-(order[b.special]??3);
  });
  const rest=DATA.filter(d=>!d.special).sort((a,b)=>a.id.localeCompare(b.id,'fr'));
  sp.forEach(d=>addItem(list,d));
  if(sp.length&&rest.length){const s=document.createElement('div');s.className='sep';list.appendChild(s);}
  rest.forEach(d=>addItem(list,d));
  const allSim=new Set();
  DATA.forEach(d=>(d.sim||[]).forEach(s=>allSim.add(s.trim())));
  const absents=[...allSim].filter(s=>!ids.has(s)).sort((a,b)=>a.localeCompare(b,'fr'));
  if(absents.length){
    const sep=document.createElement('div');sep.className='sep';list.appendChild(sep);
    const t=document.createElement('div');t.className='sec-title';t.textContent='Non répertoriés';list.appendChild(t);
    absents.forEach(s=>{
      const li=document.createElement('div');li.className='si si-absent';
      li.innerHTML=`<div class="sdot" style="background:#ccc;border:1.5px solid #999"></div>${s}`;
      list.appendChild(li);
    });
  }
}

function addItem(list,d){
  const p=PAL[d.ordre]||PAL.Podzol;
  const li=document.createElement('div');li.className='si';li.dataset.id=d.id;
  let badges='';
  if(d.special==='emblématique') badges+=`<span class="sb se">★</span>`;
  else if(d.special==='magique') badges+=`<span class="sb sm">✦</span>`;
  else if(d.special==='sapin') badges+=`<span class="sb ss">🎄</span>`;
  const pdfIcon=d.pdf?`<span class="spdf" title="Fiche disponible">⛏</span>`:'';
  li.innerHTML=`<div class="sdot" style="background:${p.fill};border:1.5px solid ${p.stroke}"></div>${d.id}${badges}${pdfIcon}`;
  li.addEventListener('click',()=>{if(selected===d.id){closePanel();}else{selected=d.id;filterOrdre='';searchStr='';document.getElementById('filter').value='';document.getElementById('search').value='';ab.style.display='none';const n=nb(d.id);if(n)openPanel(n);updateActive();draw();}});
  list.appendChild(li);
}
function updateActive(){document.querySelectorAll('.si').forEach(el=>el.classList.toggle('on',el.dataset.id===selected));}

fetch('sols.json').then(r=>r.json()).then(data=>{resize();initData(data.series);}).catch(e=>console.error('Erreur:',e));
window.addEventListener('resize',resize);
</script>
</body>
</html>
